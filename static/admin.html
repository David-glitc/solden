<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/solden-mark.svg" type="image/svg+xml" />
  <title>Solden · Admin</title>
  <style>
    :root {
      --bg: #0b1220; --card: #1e293b; --line: #334155;
      --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6;
      --ok: #22c55e; --err: #ef4444;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.5 system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 960px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
    .row .grow { flex: 1; }
    h1 { margin: 0; font-size: 1.2rem; }
    a { color: #93c5fd; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 16px; }
    .card h2 { margin: 0 0 12px; font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .stat { background: #0f172a; border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
    .stat .k { font-size: 0.65rem; text-transform: uppercase; color: var(--muted); }
    .stat .v { font-weight: 700; margin-top: 4px; }
    .form { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; }
    input, select { padding: 8px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: #fff; font: inherit; }
    button { padding: 8px 14px; border: 0; border-radius: 6px; font-weight: 600; cursor: pointer; background: var(--accent); color: #fff; }
    button.secondary { background: #475569; }
    button.danger { background: var(--err); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hidden { display: none !important; }
    .job { border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 8px; background: #0f172a; }
    .job .head { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 6px; }
    .badge { font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; }
    .badge.running { background: #1e3a5f; color: #93c5fd; }
    .badge.done { background: #14532d; color: #86efac; }
    .badge.failed, .badge.cancelled { background: #3f3f46; color: #d4d4d8; }
    .badge.queued { background: #422006; color: #fcd34d; }
    .mono { font-family: ui-monospace, monospace; font-size: 0.8rem; word-break: break-all; }
    .muted { color: var(--muted); font-size: 0.82rem; }
    .err { color: #fca5a5; }
    #toast { position: fixed; bottom: 16px; right: 16px; background: #1e293b; border: 1px solid var(--line); padding: 10px 14px; border-radius: 8px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    #toast.show { opacity: 1; }
    #statusBar { font-size: 0.8rem; color: var(--muted); }
    #statusBar.ok { color: var(--ok); }
    #statusBar.err { color: var(--err); }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="row card">
      <img src="/solden-mark.svg" width="40" height="40" alt="" />
      <div class="grow">
        <h1>Admin</h1>
        <a href="/">← Search</a>
      </div>
      <span id="statusBar">Offline</span>
      <button type="button" class="secondary hidden" id="logoutBtn">Sign out</button>
    </header>

    <section class="card" id="loginCard">
      <h2>Sign in</h2>
      <p class="muted">Set <code>VANITY_ADMIN_PASSWORD</code> on the server.</p>
      <div class="form" style="max-width:320px">
        <label>Password<input id="adminPw" type="password" autocomplete="current-password" /></label>
      </div>
      <div class="row" style="margin-top:12px">
        <button type="button" id="loginBtn">Sign in</button>
      </div>
      <p id="loginErr" class="err hidden"></p>
    </section>

    <div id="appPanel" class="hidden" style="display:flex;flex-direction:column;gap:16px">
      <section class="card">
        <h2>System</h2>
        <div class="grid" id="monitorGrid"></div>
        <div class="row" style="margin-top:12px">
          <button type="button" class="secondary" id="clearMemBtn">Clear finished jobs</button>
          <button type="button" class="danger" id="restartBtn">Restart process</button>
        </div>
        <p class="muted" style="margin:8px 0 0">Restart needs <code>VANITY_ADMIN_ALLOW_RESTART=1</code></p>
      </section>

      <section class="card">
        <h2>New job</h2>
        <div class="form">
          <label>Prefix<input id="jPrefix" value="meth" spellcheck="false" /></label>
          <label>Suffix<input id="jSuffix" value="" spellcheck="false" /></label>
          <label>Count<input id="jCount" type="number" min="1" value="1" /></label>
          <label>Threshold %<input id="jThreshold" type="number" min="0" max="100" value="90" /></label>
          <label>Mode
            <select id="jPerfMode">
              <option value="standard">Standard</option>
              <option value="unthrottled">Unthrottled</option>
              <option value="extreme" selected>Extreme</option>
            </select>
          </label>
        </div>
        <div class="row" style="margin-top:12px">
          <button type="button" id="spawnJobBtn">Start job</button>
        </div>
      </section>

      <section class="card">
        <h2>Jobs <span class="muted" id="jobsHint">(live stream)</span></h2>
        <div id="jobsList"><p class="muted">No jobs yet.</p></div>
      </section>
    </div>
  </div>

  <div id="toast"></div>

  <script>
  (function() {
    const TOKEN_KEY = "vanity_admin_token";
    const q = (id) => document.getElementById(id);
    let es = null;
    let authFailCount = 0;

    function token() { return localStorage.getItem(TOKEN_KEY) || ""; }
    function setToken(t) { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); }
    function headers() {
      const h = { "content-type": "application/json" };
      const t = token();
      if (t) h.authorization = "Bearer " + t;
      return h;
    }
    function toast(msg) {
      const el = q("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.remove("show"), 2800);
    }
    function setStatus(msg, ok) {
      const el = q("statusBar");
      el.textContent = msg;
      el.className = ok ? "ok" : ok === false ? "err" : "";
    }

    async function api(path, opts) {
      let r;
      try {
        r = await fetch(path, Object.assign({ headers: headers() }, opts || {}));
      } catch (e) {
        throw new Error("Network error — check server is running and CORS allows this origin.");
      }
      const text = await r.text();
      let j = null;
      try { j = JSON.parse(text); } catch { /* ignore */ }
      if (r.status === 401) {
        authFailCount++;
        if (authFailCount >= 2) {
          setToken("");
          stopStream();
          showLogin();
        }
        throw new Error((j && j.error) || "Session expired — sign in again");
      }
      if (r.status === 503) throw new Error((j && j.error) || "Admin not configured on server (set VANITY_ADMIN_PASSWORD)");
      if (!r.ok) throw new Error((j && j.error) || text.slice(0, 160));
      authFailCount = 0;
      return j;
    }

    function showLogin() {
      q("loginCard").classList.remove("hidden");
      q("appPanel").classList.add("hidden");
      q("logoutBtn").classList.add("hidden");
      setStatus("Signed out", null);
    }
    function showApp() {
      q("loginCard").classList.add("hidden");
      q("appPanel").classList.remove("hidden");
      q("logoutBtn").classList.remove("hidden");
    }

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function renderMonitor(m) {
      if (!m) return;
      const rows = [
        ["Free RAM", m.memoryFreeMB != null ? m.memoryFreeMB + " MB" : "—"],
        ["Used RAM", m.memoryUsedMB != null ? m.memoryUsedMB + " MB" : "—"],
        ["RSS", m.rssMB != null ? m.rssMB + " MB" : "—"],
        ["CPU cores", m.cpuCount],
        ["Running", m.runningJobs],
        ["Runtime", m.runtime],
      ];
      q("monitorGrid").innerHTML = rows.map(([k,v]) =>
        '<div class="stat"><div class="k">' + k + '</div><div class="v">' + v + '</div></div>').join("");
    }

    function renderJobs(jobs) {
      const el = q("jobsList");
      if (!jobs || !jobs.length) {
        el.innerHTML = '<p class="muted">No jobs yet.</p>';
        return;
      }
      el.innerHTML = jobs.map(function(job) {
        const p = job.progress || {};
        const mode = job.perfMode || "standard";
        const hits = (job.hits || []).concat(job.thresholdHits || []);
        const hitsHtml = hits.length
          ? hits.slice(0, 5).map(h => '<div class="mono">' + esc(h.address) + ' · ' + h.score + '%</div>').join("")
          : '<div class="muted">No keys yet</div>';
        const actions =
          (job.status === "running" || job.status === "queued"
            ? '<button type="button" class="danger" data-cancel="' + esc(job.id) + '">Cancel</button> '
            : "") +
          '<button type="button" class="secondary" data-delete="' + esc(job.id) + '">Delete</button>';
        return '<div class="job" data-id="' + esc(job.id) + '">' +
          '<div class="head"><span class="badge ' + job.status + '">' + job.status + '</span>' +
          '<span class="mono">' + esc(job.id) + '</span></div>' +
          '<div class="muted">' + esc(job.opts.prefix) + ' / ' + esc(job.opts.suffix || "—") +
          ' · ' + mode + ' · ' + (p.totalChecked||0).toLocaleString() + ' keys · ' +
          (p.aggregateKps||0).toLocaleString() + '/s</div>' +
          hitsHtml +
          (job.error ? '<div class="err">' + esc(job.error) + '</div>' : '') +
          '<div class="row" style="margin-top:8px">' + actions + '</div></div>';
      }).join("");
      el.querySelectorAll("[data-cancel]").forEach(btn => {
        btn.onclick = async () => {
          try {
            await api("/admin/api/jobs/" + encodeURIComponent(btn.dataset.cancel) + "?cancel=1", { method: "DELETE" });
            toast("Cancelled");
          } catch (e) { toast(e.message); }
        };
      });
      el.querySelectorAll("[data-delete]").forEach(btn => {
        btn.onclick = async () => {
          if (!confirm("Delete this job?")) return;
          try {
            await api("/admin/api/jobs/" + encodeURIComponent(btn.dataset.delete), { method: "DELETE" });
            toast("Deleted");
          } catch (e) { toast(e.message); }
        };
      });
    }

    function onSnapshot(data) {
      if (data.monitor) renderMonitor(data.monitor);
      if (data.jobs) renderJobs(data.jobs);
      const active = (data.jobs || []).some(j => j.status === "running" || j.status === "queued");
      q("jobsHint").textContent = active ? "(live · streaming)" : "(idle)";
      setStatus(active ? "Live" : "Connected", true);
    }

    function stopStream() {
      if (es) { es.close(); es = null; }
    }

    function startStream() {
      stopStream();
      const t = token();
      if (!t) return;
      const url = "/admin/api/stream";
      es = new EventSource(url + "?token=" + encodeURIComponent(t));
      es.onmessage = function(ev) {
        try {
          const data = JSON.parse(ev.data);
          if (data.type === "snapshot") onSnapshot(data);
          if (data.type === "error") setStatus(data.error, false);
        } catch { /* ignore */ }
      };
      es.onerror = function() {
        setStatus("Stream reconnecting…", false);
        stopStream();
        setTimeout(startStream, 2000);
      };
    }

    async function verifySession() {
      await api("/admin/api/monitor");
      return true;
    }

    q("loginBtn").onclick = async function() {
      q("loginErr").classList.add("hidden");
      try {
        const r = await fetch("/admin/api/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ password: q("adminPw").value }),
        });
        const j = await r.json();
        if (!r.ok || !j.token) throw new Error(j.error || "Login failed");
        setToken(j.token);
        authFailCount = 0;
        showApp();
        startStream();
        toast("Signed in");
      } catch (e) {
        q("loginErr").textContent = e.message;
        q("loginErr").classList.remove("hidden");
      }
    };

    q("logoutBtn").onclick = function() {
      setToken("");
      stopStream();
      showLogin();
    };

    q("spawnJobBtn").onclick = async function() {
      const prefix = q("jPrefix").value.trim();
      const suffix = q("jSuffix").value.trim();
      if (!prefix && !suffix) { toast("Prefix or suffix required"); return; }
      try {
        await api("/admin/api/jobs", {
          method: "POST",
          body: JSON.stringify({
            prefix, suffix,
            count: parseInt(q("jCount").value, 10) || 1,
            threshold: parseInt(q("jThreshold").value, 10) || 90,
            perfMode: q("jPerfMode").value,
            threads: 4,
            maxWorkers: 64,
          }),
        });
        toast("Job started");
      } catch (e) { toast(e.message); }
    };

    q("clearMemBtn").onclick = async function() {
      try {
        const r = await api("/admin/api/system/cleanup", { method: "POST" });
        toast("Cleared " + (r.removedJobs || 0) + " jobs");
      } catch (e) { toast(e.message); }
    };

    q("restartBtn").onclick = async function() {
      if (!confirm("Restart server process?")) return;
      try {
        const r = await api("/admin/api/system/restart", { method: "POST" });
        toast(r.message || "Restarting");
        setTimeout(() => location.reload(), 2000);
      } catch (e) { toast(e.message); }
    };

    fetch("/admin/api/status").then(r => r.json()).then(s => {
      if (!s.configured) {
        q("loginErr").textContent = "VANITY_ADMIN_PASSWORD not set on server.";
        q("loginErr").classList.remove("hidden");
      }
    });

    if (token()) {
      showApp();
      verifySession().then(() => startStream()).catch(e => {
        toast(e.message);
        if (/expired|unauthorized/i.test(e.message)) showLogin();
        else startStream();
      });
    }
  })();
  </script>
</body>
</html>
